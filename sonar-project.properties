# Sonar config for core/ui — https://sonar.lthn.sh/dashboard?id=core_ui
#
# Local scan: sonar-scanner -Dsonar.token="$(cat ~/.claude/secrets/sonarqube_core_ui_token)"
# CI: SONAR_TOKEN repo secret + sonar-scanner GitHub Action.

sonar.projectKey=core_ui
sonar.projectName=core/ui
sonar.host.url=https://sonar.lthn.sh

# Sources: the TypeScript surface lives at the root + under src/.
sonar.sources=index.ts,src

# Tests: vitest *.test.ts files colocated under src/.
sonar.tests=src
sonar.test.inclusions=**/*.test.ts

# Excluded: node_modules, build outputs, scanner cache, compiled
# alongside-sources JS once tsc starts emitting.
sonar.exclusions=node_modules/**,**/*.d.ts,**/*.js,**/*.js.map,.scannerwork/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
